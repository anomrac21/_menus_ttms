<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="/branding/ttmenus.gif" alt="TTMenus Logo" class="auth-logo">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to access your dashboard</p>
      </div>

      <!-- Alert Messages -->
      <div id="alertContainer"></div>

      <button type="button" class="btn-google" id="googleLoginBtn" aria-label="Sign in with Google">
        <svg class="btn-google-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider auth-divider-or">
        <span>or sign in with email</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" method="post" action="javascript:void(0);" onsubmit="return false;">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-links">
        <a href="/forgot-password/" class="auth-link">Forgot your password?</a>
      </div>

      <div class="auth-divider">
        <span>Don't have an account?</span>
      </div>

      <a href="https://ttmenus.com/signup/" class="btn-secondary" target="_blank" rel="noopener noreferrer">
        Create Account
      </a>

      <p class="auth-signup-note">
        Or contact your administrator if you need access to this menu site.
      </p>

      <div class="auth-links" style="margin-top: 20px;">
        <a href="/" class="auth-link">← Back to Home</a>
      </div>
    </div>
  </div>

  <!-- Login Page Script: ensure AUTH_CONFIG, load auth-client from site root, then run -->
  {{- if site.Params.auth.enabled -}}
  <script>
    window.AUTH_CONFIG = window.AUTH_CONFIG || { apiUrl: "{{ site.Params.auth.apiUrl }}" };
    window.SITE_CLIENT_ID = window.SITE_CLIENT_ID || "{{ .Site.Params.contentManagement.clientId | default .Site.Params.ads.clientId | default "" }}";
  </script>
  {{- end -}}
  <script>
    (function() {
      async function runLoginPage() {
        if (!window.AuthClient) {
          console.error('AuthClient is not loaded. Check that auth is enabled and js/auth-client.js is available.');
          return;
        }
        if (typeof AuthClient.whenReady === 'function') {
          await AuthClient.whenReady();
        }
        var form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertContainer = document.getElementById('alertContainer');

        function redirectAfterSuccessfulLogin() {
          var url = '/';
          if (window.AuthMiddleware && typeof AuthMiddleware.resolvePostLoginRedirect === 'function') {
            url = AuthMiddleware.resolvePostLoginRedirect();
          } else if (window.AuthClientAccess && AuthClientAccess.hasClientAccess()) {
            url = '/dashboard/';
          } else {
            var saved = sessionStorage.getItem('ttmenus_redirect_after_login');
            if (saved) {
              sessionStorage.removeItem('ttmenus_redirect_after_login');
              url = saved;
            }
          }
          window.location.href = url;
        }

        if (AuthClient.isAuthenticated()) {
          redirectAfterSuccessfulLogin();
          return;
        }

        var oauthMsg = AuthClient.parseOAuthRedirectMessage && AuthClient.parseOAuthRedirectMessage();
        if (oauthMsg) {
          showAlert(oauthMsg.type === 'success' ? 'success' : 'error', oauthMsg.message);
          AuthClient.clearOAuthRedirectParams && AuthClient.clearOAuthRedirectParams();
          if (oauthMsg.type === 'success') {
            AuthClient.syncHubSession().then(function() {
              setTimeout(redirectAfterSuccessfulLogin, 800);
            });
          }
        }

        var googleBtn = document.getElementById('googleLoginBtn');
        if (googleBtn) {
          googleBtn.addEventListener('click', function() {
            if (typeof AuthClient.loginWithGoogle === 'function') {
              AuthClient.loginWithGoogle({ action: 'login', returnTo: window.location.href });
              return;
            }
            if (window.TTMSGoogleAuth && typeof TTMSGoogleAuth.loginWithGoogle === 'function') {
              TTMSGoogleAuth.loginWithGoogle({ action: 'login', returnTo: window.location.href });
              return;
            }
            showAlert('error', 'Google sign-in is unavailable. Please refresh the page.');
          });
        }

      function getClientIdForRedirect(user) {
        let clientId = user?.client_id;
        if (!clientId) {
          const hostname = window.location.hostname;
          const domainParts = hostname.split('.');
          if (domainParts.length >= 2 && domainParts[1] === 'ttmenus' && domainParts[2] === 'com') {
            clientId = domainParts[0];
          } else {
            clientId = window.SITE_CLIENT_ID || '_ttms_menu_demo';
          }
        }
        return clientId;
      }

      // Handle form submission - prevent default form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        e.stopPropagation();

        // Clear previous errors
        clearErrors();

        // Get form values
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Basic validation
        if (!email) {
          showError('emailError', 'Email is required');
          return;
        }

        if (!password) {
          showError('passwordError', 'Password is required');
          return;
        }

        // Show loading state
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Signing In...';

        try {
          // Log attempt for debugging
          console.log('🔐 Attempting login...');
          console.log('📡 API URL:', AuthClient.config.apiUrl);
          
          // Attempt login
          const result = await AuthClient.login(email, password);
          console.log('📥 Login result:', result);

          if (result.success) {
            var hasDashboardAccess =
              window.AuthClientAccess &&
              typeof AuthClientAccess.hasClientAccess === 'function' &&
              AuthClientAccess.hasClientAccess();
            showAlert(
              'success',
              hasDashboardAccess
                ? 'Login successful! Redirecting to dashboard...'
                : 'Login successful! Redirecting...'
            );
            setTimeout(function() {
              const user = AuthClient.getCurrentUser();
              if (!user) {
                showAlert('error', 'Authentication failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
                return;
              }
              redirectAfterSuccessfulLogin();
            }, 600);
          } else {
            console.error('❌ Login failed:', result.error);
            showAlert('error', result.error || 'Login failed. Please check your credentials.');
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Sign In';
          }
        } catch (error) {
          console.error('💥 Login exception:', error);
          
          // Provide more specific error messages
          let errorMessage = 'An unexpected error occurred. ';
          
          if (error.message === 'Failed to fetch' || error.message.includes('fetch')) {
            if (/^localhost$|^127\.0\.0\.1$/i.test(window.location.hostname || '')) {
              errorMessage = '⚠️ Cannot connect to authentication service. Please ensure the auth service is running on http://localhost:8080';
              console.error('🔴 Auth service not reachable. Run: cd ttms-app-cluster/services/auth-service && go run cmd/main.go');
            } else {
              errorMessage = '⚠️ Cannot connect to authentication service (https://auth.ttmenus.com). Please try again later.';
            }
          } else if (error.message.includes('CORS')) {
            errorMessage = '⚠️ CORS error. Please check auth service CORS configuration.';
          } else if (error.message.includes('NetworkError')) {
            errorMessage = '⚠️ Network error. Please check your internet connection and auth service.';
          }
          
          showAlert('error', errorMessage);
          loginBtn.disabled = false;
          loginBtn.innerHTML = 'Sign In';
        }
      });

      // Helper functions
      function showError(elementId, message) {
        const errorElement = document.getElementById(elementId);
        if (errorElement) {
          errorElement.textContent = message;
          errorElement.classList.add('show');
          
          // Also add error class to input
          const inputId = elementId.replace('Error', '');
          const input = document.getElementById(inputId);
          if (input) {
            input.classList.add('error');
          }
        }
      }

      function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => {
          el.textContent = '';
          el.classList.remove('show');
        });
        document.querySelectorAll('.form-input').forEach(el => {
          el.classList.remove('error');
        });
      }

      function showAlert(type, message) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type}`;
        alertDiv.textContent = message;
        alertContainer.innerHTML = '';
        alertContainer.appendChild(alertDiv);
      }

      // Clear error on input
      emailInput.addEventListener('input', () => {
        emailInput.classList.remove('error');
        document.getElementById('emailError').classList.remove('show');
      });

      passwordInput.addEventListener('input', () => {
        passwordInput.classList.remove('error');
        document.getElementById('passwordError').classList.remove('show');
      });

      // Function to create CMS session securely via POST
      async function createCMSSession(clientId, token) {
        try {
          console.log('🔐 Creating CMS session for client:', clientId);
          
          // Create session via POST to CMS API
          const response = await fetch(`https://cms.ttmenus.com/api/sessions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            credentials: 'include', // Include cookies for cross-origin requests
            mode: 'cors', // Enable CORS
            body: JSON.stringify({
              client_id: clientId
            })
          });

          const responseData = await response.json();
          console.log('📥 CMS session response:', response.status, responseData);

          if (response.ok) {
            // Session created successfully, redirect to update-ui editor (public route)
            console.log('✅ Session created, redirecting to update-ui editor...');
            window.location.href = `https://cms.ttmenus.com/api/clients/${encodeURIComponent(clientId)}/preview/update-ui`;
          } else {
            // Fallback: try login-redirect endpoint (less secure but works)
            console.warn('⚠️ Session creation failed, using fallback redirect. Error:', responseData);
            // Use login-redirect endpoint which will set session and redirect to update-ui
            window.location.href = `https://cms.ttmenus.com/login-redirect?client_id=${encodeURIComponent(clientId)}&token=${encodeURIComponent(token)}`;
          }
        } catch (error) {
          console.error('❌ Error creating CMS session:', error);
          // Fallback: redirect to login-redirect endpoint
          // Note: This puts token in URL which is less secure, but necessary for fallback
          // The login-redirect endpoint will set the session cookie and redirect to update-ui
          window.location.href = `https://cms.ttmenus.com/login-redirect?client_id=${encodeURIComponent(clientId)}&token=${encodeURIComponent(token)}`;
        }
      }
      }

      function loadScript(src, onload) {
        var script = document.createElement('script');
        script.src = src;
        script.onload = onload;
        script.onerror = onload;
        document.head.appendChild(script);
      }

      function start() {
        if (window.AuthClient) {
          runLoginPage();
          return;
        }
        var base = new URL('/js/', window.location.origin).href;
        loadScript(base + 'auth-client.js?v=google-oauth', function() {
          loadScript(base + 'auth-google-oauth.js?v=google-oauth', runLoginPage);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
    })();
  </script>
</body>
</html>
