<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  {{ partial "dashboard/edit-head-theme.html" . }}
</head>
<body class="dashboard-edit-theme-only">
  <div class="dashboard-edit-page" id="dashboardEditPage" data-edit-submode="color" data-edit-mode="edit">
    <header class="dashboard-edit-header dashboard-edit-header--theme" aria-label="Theme editor toolbar">
      <div class="dashboard-edit-header-inner">
        <div class="dashboard-edit-header-start">
          <a href="/dashboard/" class="btn-dash btn-dash-secondary dashboard-edit-header-back" id="btnDashboardBack" title="Back to dashboard" aria-label="Back to dashboard"><i class="fa fa-arrow-left" aria-hidden="true"></i></a>
        </div>
        <div class="dashboard-edit-header-center dashboard-edit-header-center--theme">
          <h1 class="dashboard-edit-header-theme-title"><i class="fa fa-paint-brush" aria-hidden="true"></i> Theme colors</h1>
        </div>
      </div>
    </header>

    <div class="dashboard-edit-layout">
      <section class="dashboard-edit-preview" aria-label="Menu preview">
        <div class="dashboard-edit-preview-frame-wrap">
          <iframe
            id="menuPreviewFrame"
            class="dashboard-edit-preview-frame"
            title="Menu preview"
            src="about:blank"
            data-preview-src="/"
            loading="lazy"
          ></iframe>
        </div>
      </section>

      <aside class="dashboard-edit-color-aside" id="dashboardEditColorAside" aria-label="Edit theme colors">
        <div class="dashboard-edit-color-aside-inner">
          <div class="dashboard-edit-color-aside-header">
            <div class="dashboard-edit-color-aside-title-block">
              <span class="dashboard-edit-color-aside-title-icon" id="dashboardEditColorAsideTitleIcon" aria-hidden="true"><i class="fa fa-paint-brush"></i></span>
              <p class="dashboard-edit-color-aside-title" id="dashboardEditColorAsideTitle">Theme colors</p>
            </div>
            <div class="dashboard-edit-color-aside-header-actions">
              <button type="button" class="dashboard-edit-color-aside-close hidden" id="btnCloseColorSection" aria-label="Back to sections" title="Back to sections">
                <i class="fa fa-arrow-left" aria-hidden="true"></i>
              </button>
              <button type="button" class="dashboard-edit-color-aside-toggle" id="btnToggleColorPanel" aria-expanded="true" aria-label="Collapse color panel">
                <span class="dashboard-edit-color-aside-toggle-icon" aria-hidden="true"><i class="fa fa-chevron-left" aria-hidden="true"></i></span>
                <span class="dashboard-edit-color-aside-toggle-text">Collapse</span>
              </button>
            </div>
          </div>
          <div id="dashboardEditColorPrompt" class="dashboard-edit-color-prompt">
            <p class="dashboard-edit-color-intro">Pick a section to adjust CSS variables. Changes preview live in the menu and are saved automatically when you go back to the dashboard.</p>
            <div class="dashboard-edit-color-sections" id="dashboardEditColorSections" role="list"></div>
          </div>
          <div id="dashboardEditColorForm" class="dashboard-edit-color-form hidden">
            <div id="dashboardEditColorFields" class="dashboard-edit-color-fields"></div>
            <div class="dashboard-edit-color-actions">
              <button type="button" class="btn-dash btn-dash-primary" id="btnApplyColor">Apply to preview</button>
              <button type="button" class="btn-dash btn-dash-secondary" id="btnBackColorSections"><i class="fa fa-arrow-left" aria-hidden="true"></i> Sections</button>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
