<div id="cart" class="cart-hidden" role="dialog" aria-modal="true" aria-labelledby="cart-title" aria-hidden="true">
	<div class="order cart-shell">
		<div class="cart-header-modern">
			<div class="cart-title-bar">
				<button type="button" class="cart-back-btn" onclick="toggleCart();" title="Close cart" aria-label="Close cart">
					<i class="fa fa-arrow-left" aria-hidden="true"></i>
				</button>
				<h2 class="cart-title" id="cart-title">
					<span class="cart-title__icon-wrap" aria-hidden="true">
						<i class="fa fa-shopping-cart"></i>
					</span>
					<span class="cart-title__text">My Order</span>
				</h2>
				<button type="button" class="cart-close-btn" onclick="toggleCart();" title="Close cart" aria-label="Close cart">
					<i class="fa fa-times" aria-hidden="true"></i>
				</button>
			</div>

			<div class="cart-location-row">
				<button type="button" id="cartLocationChangeBtn" class="cart-location-btn" onclick="openLocationPickerFromCart(); return false;" aria-label="Choose a location">
					<span class="cart-location-btn__icon-wrap" aria-hidden="true">
						<i class="fa fa-map-marker"></i>
					</span>
					<span class="cart-location-btn__copy">
						<span class="cart-location-btn__label">Ordering from</span>
						<strong class="cart-location-btn__address" id="cartLocationAddress">Select a location</strong>
					</span>
					<span class="cart-location-btn__chevron" aria-hidden="true">
						<i class="fa fa-chevron-right"></i>
					</span>
				</button>
				<select id="locationSelect" class="cart-location-select-hidden" onchange="selectLocation(this.value)" aria-hidden="true" tabindex="-1">
					<option value="">Select a location...</option>
					{{ range $index, $location := site.Data.locations.locations }}
					<option value="{{ $location.whatsapp }}" data-address="{{ $location.address }}" data-lat="{{ index $location.latlon 0 }}" data-lng="{{ index $location.latlon 1 }}" data-orderingtables="{{ if $location.orderingtables }}{{ delimit $location.orderingtables "," }}{{ end }}" {{ if eq $index 0 }}selected{{ end }}>
						{{ $location.address }}
					</option>
					{{ end }}
				</select>
			</div>

			<div class="cart-dining-mode-section hide" id="button-5">
				<div class="dining-mode-toggle-modern">
					<div class="toggle-label">
						<i class="fa fa-cutlery" aria-hidden="true"></i>
						<span>Dine In</span>
					</div>
					<label class="toggle-switch-modern">
						<input type="checkbox" class="checkbox" id="dining-mode-checkbox-2" onclick="toggleDiningMode(this);"/>
						<span class="toggle-slider-modern">
							<span class="toggle-slider-inner"></span>
						</span>
					</label>
					<div class="toggle-label">
						<i class="fa fa-shopping-bag" aria-hidden="true"></i>
						<span>Takeaway</span>
					</div>
				</div>
			</div>
		</div>

		<div class="cart-items-wrapper">
			<div class="cart-empty-state" id="cartEmptyState">
				<div class="cart-empty-state__icon-wrap" aria-hidden="true">
					<i class="fa fa-shopping-cart"></i>
				</div>
				<p class="cart-empty-state__title">Your cart is empty</p>
				<p class="cart-empty-state__hint">Browse the menu and tap an item to add it here</p>
			</div>
			<div id="cartItemsContainer" class="cart-items-list"></div>
			<div class="cart-actions-row">
				<button type="button" class="btn-clear-cart" onclick="removeAllItems();" title="Clear all items">
					<i class="fa fa-trash-o" aria-hidden="true"></i>
					<span>Clear cart</span>
				</button>
			</div>
		</div>
	</div>

	<div id="whatsappOrderBtn" class="cart-checkout-bar">
		<div class="cart-checkout-bar__totals">
			<div id="subTotalcontainer" class="cart-total-row hide">
				<div id="sub">Sub Total $</div>
				<div id="subTotal">0</div>
			</div>
			<div id="vatCalccontainer" class="cart-total-row hide">
				<div id="vat"></div>
				<div id="vatCalc"></div>
			</div>
			<div id="serviceCalccontainer" class="cart-total-row hide">
				<div id="service"></div>
				<div id="serviceCalc"></div>
			</div>
			<div id="itemTotal" class="cart-total-grand">TOTAL $0.00</div>
		</div>
		<div class="cart-checkout-bar__actions">
		{{- if and site.Params.features.payments site.Params.paymentService.enabled -}}
			<button type="button" class="btn-place-order btn-pay-order btn-place-order--disabled" onclick="placeOrderClick();" disabled aria-disabled="true"><i class="fa fa-credit-card" aria-hidden="true"></i><span>Pay &amp; Order</span></button>
		{{- else if site.Params.orderingsystem.usephonecall -}}
			<button type="button" class="placeOrder btn-place-order btn-place-order--disabled" onclick="placeOrderClick();" disabled aria-disabled="true"><i class="fa fa-phone" aria-hidden="true"></i><span>Order Now</span></button>
		{{- else -}}
			<button type="button" class="btn-place-order btn-place-order--disabled" onclick="placeOrderClick();" disabled aria-disabled="true"><i class="fa fa-whatsapp" aria-hidden="true"></i><span>Order Now</span></button>
		{{- end -}}
		</div>
	</div>
</div>
