<div id="footerSettings" class="hide" aria-hidden="true">
	<div class="settings-panel footer-settings-popover" role="dialog" aria-label="Menu settings">
		<div class="footer-settings-popover__header">
			<span class="footer-settings-popover__title">Quick settings</span>
			<button type="button" class="footer-settings-popover__close" onclick="closeFooterSettings(); return false;" aria-label="Close settings">
				<i class="fa fa-times" aria-hidden="true"></i>
			</button>
		</div>
		<div class="footer-settings-popover__body">
			<div class="footer-settings-popover__row footer-settings-popover__nav-mode" id="settingsNavModeRow">
				<span class="footer-settings-popover__nav-mode-label">
					<span class="footer-settings-popover__btn-icon" aria-hidden="true"><i class="fa fa-arrows-v"></i></span>
					<span class="footer-settings-popover__nav-mode-text">Navigation</span>
				</span>
				<div class="footer-settings-nav-toggle" role="group" aria-label="Navigation style">
					<button type="button" class="footer-settings-nav-toggle__btn is-active" data-nav-mode="snap" aria-pressed="true">Snap</button>
					<button type="button" class="footer-settings-nav-toggle__btn" data-nav-mode="smooth" aria-pressed="false">Smooth</button>
				</div>
			</div>
			<a id="settingsLoginOrDashboard" href="/login/" class="btn settings-btn footer-settings-popover__btn" data-aos="zoom-in" data-barba="prevent" data-auth="guest">
				<span class="footer-settings-popover__btn-icon" aria-hidden="true"><i class="fa fa-user"></i></span>
				<span class="footer-settings-popover__btn-label">Login</span>
			</a>
			<a id="settingsAccountLink" href="https://www.ttmenus.com/account/" class="btn settings-btn footer-settings-popover__btn" data-aos="zoom-in" data-auth="required" style="display: none" target="_blank" rel="noopener noreferrer">
				<span class="footer-settings-popover__btn-icon" aria-hidden="true"><i class="fa fa-user"></i></span>
				<span class="footer-settings-popover__btn-label">My account</span>
			</a>
			<button type="button" id="settingsLogout" class="btn settings-btn footer-settings-popover__btn footer-settings-popover__btn--logout" data-auth="required" data-logout style="display: none" aria-label="Log out">
				<span class="footer-settings-popover__btn-icon" aria-hidden="true"><i class="fa fa-sign-out"></i></span>
				<span class="footer-settings-popover__btn-label">Log out</span>
			</button>
		</div>
	</div>
</div>
