<div id="dashboard" class="loader-hide-left dashboard-panel" aria-hidden="true">
	<div class="dashboard-panel-header header dashboard-header-bar">
		<a href="https://www.ttmenus.com" class="dashboard-header-brand" onclick="if (typeof closeAll === 'function') closeAll();">
			<span class="dashboard-header-brand__mark" aria-hidden="true">
				<img class="dashboard-header-logo dashboard-header-logo--gif" src="https://cdn.ttmenus.com/branding/ttmenus/ttmenu.gif" alt="">
			</span>
			<img class="dashboard-header-logo dashboard-header-logo--wordmark" src="https://cdn.ttmenus.com/branding/ttmenus/ttmenus.webp" alt="TT Menus">
		</a>
		<div class="dashboard-header-trailing">
			{{ partialCached "ttms-account-dashboard/panel-button.html" . }}
			<a href="/dashboard/" class="dashboard-header-admin-link ttms-icon-btn" data-auth="admin-site" style="display: none;" title="Menu dashboard" aria-label="Menu dashboard" data-barba="prevent" onclick="if (typeof closeAll === 'function') closeAll();">
				<i class="fa fa-th-large" aria-hidden="true"></i>
			</a>
			<button type="button" class="dashboard-header-close ttms-icon-btn ttms-icon-btn--on-dark" onclick="closeDashboard(); return false;" aria-label="Close menu panel">
				<img class="dashboard-header-close-img" src="https://cdn.ttmenus.com/icons/ui/close.svg" alt="" width="24" height="24" decoding="async">
			</button>
		</div>
	</div>

	<div class="dashboard-panel-scroll">
		<ul class="body dashboard-panel-list">
		</ul>
		<div class="dashboard-panel-empty">
			<div class="dashboard-panel-empty__icon-wrap" aria-hidden="true">
				<img class="dashboard-panel-empty__logo" src="https://cdn.ttmenus.com/branding/ttmenus/ttmenu.gif" alt="">
			</div>
			<p class="dashboard-panel-empty__title">Powered by TT Menus</p>
			<p class="dashboard-panel-empty__hint">Digital menus for restaurants and bars across Trinidad &amp; Tobago. Use the links below to learn more or manage your account.</p>
		</div>
	</div>

	<div class="dashboardfooter dashboard-panel-footer">
		<nav class="dashboard-panel-footer__nav" aria-label="TT Menus links">
			<div class="dashboard-panel-footer__row">
				<a href="https://ttmenus.com/about-us">About</a>
				<a href="https://ttmenus.com/contact-us">Contact</a>
				<a href="https://ttmenus.com/our-services">Services</a>
			</div>
			<div class="dashboard-panel-footer__row">
				<a href="https://ttmenus.com/privacy-policy">Privacy</a>
				<a href="https://ttmenus.com/terms-and-conditions">Terms</a>
			</div>
		</nav>
	</div>
</div>
