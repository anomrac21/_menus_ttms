// ============================================================================
// UNIFIED SIDE CATEGORY MANAGER - Efficient, centralized system
// ============================================================================
class SideCategoryManager {
	constructor() {
		this.categories = new Map(); // categoryName -> { config, items, selections }
		this.selections = new Map(); // categoryName -> Map(itemName -> { element, quantity, price })
	}
	
	// Initialize categories from data
	initialize(sideCategories) {
		this.categories.clear();
		this.selections.clear();
		
		if (!window.sideCategoryConfigs) window.sideCategoryConfigs = {};
		
		sideCategories.forEach((category, index) => {
			const categoryName = category.category_name || `category_${index}`;
			const displayName = category.display_name || 'Choose Options';
			const rawItems = category.items || [];
			const configObj = category.config || {};
			
			const config = {
				minimum: configObj.minimum || 0,
				maximum: configObj.maximum || 99
			};
			
			// Parse items - support both flat array [name, type, price, ...] and object array [{name, type, price, image}, ...]
			const items = [];
			if (rawItems.length > 0 && typeof rawItems[0] === 'object' && rawItems[0].name) {
				// Object array format (new format with image support)
				rawItems.forEach(item => {
					items.push({
						name: item.name || '',
						type: item.type || 'Regular',
						price: parseFloat(item.price) || 0,
						image: item.image || null
					});
				});
			} else {
				// Flat array format (backward compatible)
				for (let i = 0; i < rawItems.length; i += 3) {
					items.push({
						name: rawItems[i],
						type: rawItems[i + 1] || 'Regular',
						price: parseFloat(rawItems[i + 2]) || 0,
						image: null
					});
				}
			}
			
			this.categories.set(categoryName, { config, displayName, items });
			window.sideCategoryConfigs[categoryName] = config;
			this.selections.set(categoryName, new Map());
		});
		
		console.log(`✅ SideCategoryManager initialized with ${this.categories.size} categories`);
	}
	
	// Get category config
	getConfig(categoryName) {
		const category = this.categories.get(categoryName);
		return category ? category.config : null;
	}
	
	// Get selections for a category
	getSelections(categoryName) {
		return this.selections.get(categoryName) || new Map();
	}
	
	// Get total quantity for a category
	getTotalQuantity(categoryName) {
		const selections = this.getSelections(categoryName);
		let total = 0;
		selections.forEach(item => {
			total += item.quantity;
		});
		return total;
	}
	
	// Check if selection is valid
	canSelect(categoryName, itemName) {
		const config = this.getConfig(categoryName);
		if (!config) return false;
		
		const currentTotal = this.getTotalQuantity(categoryName);
		return (currentTotal + 1) <= config.maximum;
	}
	
	// Check if minimum is met
	meetsMinimum(categoryName) {
		const config = this.getConfig(categoryName);
		if (!config || config.minimum === 0) return true;
		
		const currentTotal = this.getTotalQuantity(categoryName);
		return currentTotal >= config.minimum;
	}
	
	// Add selection
	addSelection(categoryName, itemName, element, quantity = 1, price = 0) {
		const selections = this.getSelections(categoryName);
		selections.set(itemName, { element, quantity, price });
		
		// Update tracking array for backward compatibility
		if (!categorySidesTracking[categoryName]) {
			categorySidesTracking[categoryName] = [];
		}
		const orderItemName = `${quantity} ${itemName}`;
		if (!categorySidesTracking[categoryName].includes(orderItemName)) {
			categorySidesTracking[categoryName].push(orderItemName);
		}
		
		// Update orderSides array
		if (!orderSides.includes(orderItemName)) {
			orderSides.push(orderItemName);
		}
		
		// Update price
		sidePrice += (price * quantity);
		updatePrices();
	}
	
	// Remove selection
	removeSelection(categoryName, itemName) {
		const selections = this.getSelections(categoryName);
		const item = selections.get(itemName);
		if (!item) return;
		
		selections.delete(itemName);
		
		// Update tracking array
		if (categorySidesTracking[categoryName]) {
			const orderItemName = `${item.quantity} ${itemName}`;
			const index = categorySidesTracking[categoryName].indexOf(orderItemName);
			if (index > -1) {
				categorySidesTracking[categoryName].splice(index, 1);
			}
		}
		
		// Update orderSides array
		const orderItemName = `${item.quantity} ${itemName}`;
		const index = orderSides.indexOf(orderItemName);
		if (index > -1) {
			orderSides.splice(index, 1);
		}
		
		// Update price
		sidePrice -= (item.price * item.quantity);
		updatePrices();
	}
	
	// Update quantity for a selection
	updateQuantity(categoryName, itemName, newQuantity) {
		const selections = this.getSelections(categoryName);
		const item = selections.get(itemName);
		if (!item) return false;
		
		const config = this.getConfig(categoryName);
		if (!config) return false;
		
		// Calculate total with new quantity
		const currentTotal = this.getTotalQuantity(categoryName);
		const newTotal = currentTotal - item.quantity + newQuantity;
		
		if (newTotal > config.maximum) {
			return false; // Would exceed maximum
		}
		
		// Remove old entry
		const oldOrderItemName = `${item.quantity} ${itemName}`;
		const oldIndex = orderSides.indexOf(oldOrderItemName);
		if (oldIndex > -1) {
			orderSides.splice(oldIndex, 1);
		}
		if (categorySidesTracking[categoryName]) {
			const catIndex = categorySidesTracking[categoryName].indexOf(oldOrderItemName);
			if (catIndex > -1) {
				categorySidesTracking[categoryName].splice(catIndex, 1);
			}
		}
		
		// Update price
		sidePrice -= (item.price * item.quantity);
		
		// Update item
		item.quantity = newQuantity;
		sidePrice += (item.price * newQuantity);
		
		// Add new entry
		const newOrderItemName = `${newQuantity} ${itemName}`;
		orderSides.push(newOrderItemName);
		if (!categorySidesTracking[categoryName]) {
			categorySidesTracking[categoryName] = [];
		}
		categorySidesTracking[categoryName].push(newOrderItemName);
		
		updatePrices();
		return true;
	}
	
	// Validate all categories meet minimum requirements
	validateAll() {
		const missing = [];
		
		this.categories.forEach((categoryData, categoryName) => {
			if (!this.meetsMinimum(categoryName)) {
				missing.push({
					name: categoryData.displayName,
					required: categoryData.config.minimum,
					selected: this.getTotalQuantity(categoryName)
				});
			}
		});
		
		return missing;
	}
	
	// Clear all selections
	clear() {
		this.selections.forEach((selections, categoryName) => {
			selections.clear();
		});
		categorySidesTracking = {};
	}
}

// Function to fetch menu items JSON
async function fetchMenuItems() {
	if (menuItemsCache) {
		console.log('📦 Using cached menu items');
		return menuItemsCache;
	}
	
	if (menuItemsCachePromise) {
		console.log('⏳ Waiting for existing fetch to complete');
		return menuItemsCachePromise;
	}
	
	console.log('🔄 Fetching menu items from JSON API...');
	menuItemsCachePromise = fetch('/api/menu-items.json')
		.then(response => {
			if (!response.ok) {
				throw new Error(`HTTP error! status: ${response.status}`);
			}
			return response.json();
		})
		.then(data => {
			console.log('✅ Menu items loaded:', data.total_count, 'items');
			menuItemsCache = data.menu_items;
			menuItemsCachePromise = null;
			return menuItemsCache;
		})
		.catch(error => {
			console.error('❌ Error fetching menu items:', error);
			menuItemsCachePromise = null;
			return null;
		});
	
	return menuItemsCachePromise;
}

// Function to find menu item by URL
function findMenuItemByUrl(url) {
	if (!menuItemsCache) {
		console.error('❌ Menu items not loaded yet');
		return null;
	}
	
	const item = menuItemsCache.find(item => item.url === url);
	if (!item) {
		console.error('❌ Menu item not found for URL:', url);
	}
	return item;
}

// Function to find menu item by ID
function findMenuItemById(id) {
	if (!menuItemsCache) {
		console.error('❌ Menu items not loaded yet');
		return null;
	}
	
	const item = menuItemsCache.find(item => item.id === id);
	if (!item) {
		console.error('❌ Menu item not found for ID:', id);
	}
	return item;
}

// Function to get current location data for table modal
function getCurrentLocationData() {
	const locationSelect = document.getElementById('locationSelect');
	if (!locationSelect || locationSelect.options.length <= 1) {
		return null;
	}
	
	// Find the selected option or default to first real location
	let selectedOption = null;
	const selectedIndex = locationSelect.selectedIndex;
	
	// Check if current selection is valid (not placeholder)
	if (selectedIndex > 0 && selectedIndex < locationSelect.options.length) {
		selectedOption = locationSelect.options[selectedIndex];
		// If selected option has address data, use it even if value is empty
		if (selectedOption.getAttribute('data-address')) {
			// This is a valid location option
		} else {
			selectedOption = null;
		}
	}
	
	// If no valid selection, use first real location (skip placeholder at index 0)
	if (!selectedOption && locationSelect.options.length > 1) {
		selectedOption = locationSelect.options[1];
	}
	
	if (selectedOption) {
		const address = selectedOption.getAttribute('data-address');
		let whatsapp = selectedOption.value;
		const lat = selectedOption.getAttribute('data-lat');
		const lng = selectedOption.getAttribute('data-lng');
		const orderingtables = selectedOption.getAttribute('data-orderingtables');
		
		// If address exists, use this location (even if WhatsApp is empty, we'll use fallback)
		if (address) {
			// Use fallback WhatsApp if value is empty
			if (!whatsapp || whatsapp.trim() === '') {
				whatsapp = '{{ site.Params.orderingsystem.whatsapp }}';
			}
			
			let parsedOrderingTables = [];
			if (orderingtables && orderingtables.trim() !== '') {
				parsedOrderingTables = orderingtables.split(',').map(table => table.trim());
			}
			
			return {
				address: address,
				whatsapp: whatsapp,
				lat: lat,
				lng: lng,
				orderingtables: parsedOrderingTables
			};
		}
	}
	return null;
}

// Function to save selected location to localStorage
function saveSelectedLocation(whatsappNumber) {
	try {
		localStorage.setItem(LOCATION_STORAGE_KEY, whatsappNumber);
		console.log('💾 Location saved to localStorage:', whatsappNumber);
	} catch (error) {
		console.error('❌ Error saving location to localStorage:', error);
	}
}

// Function to load selected location from localStorage
function loadSelectedLocation() {
	try {
		const savedLocation = localStorage.getItem(LOCATION_STORAGE_KEY);
		if (savedLocation && savedLocation.trim() !== '') {
			console.log('💾 Loading saved location from localStorage:', savedLocation);
			return savedLocation;
		}
	} catch (error) {
		console.error('❌ Error loading location from localStorage:', error);
	}
	return null;
}

// Function to clear selected location from localStorage
function clearSelectedLocation() {
	try {
		localStorage.removeItem(LOCATION_STORAGE_KEY);
		console.log('🗑️ Location cleared from localStorage');
	} catch (error) {
		console.error('❌ Error clearing location from localStorage:', error);
	}
}

// Function to set location dropdown to saved value
function setLocationDropdown(savedLocation) {
	const locationSelect = document.getElementById('locationSelect');
	if (locationSelect && savedLocation) {
		// Find the option with the saved WhatsApp number
		for (let i = 0; i < locationSelect.options.length; i++) {
			if (locationSelect.options[i].value === savedLocation) {
				locationSelect.selectedIndex = i;
				console.log('📍 Location dropdown set to saved location:', savedLocation);
				return true;
			}
		}
	}
	return false;
}

// Unified function to render side categories (replaces both old systems)
function renderSideCategoryButtons(sideCategories) {
	console.log('🔧 Rendering side categories:', sideCategories.length);
	
	// Initialize manager
	sideCategoryManager.initialize(sideCategories);
	
	const buttonsContainer = document.getElementById("sideCategoriesButtonsContainer");
	const overlaysContainer = document.getElementById("itemSideControl");
	
	if (!buttonsContainer || !overlaysContainer) {
		console.error('❌ Category containers not found');
		return;
	}
	
	// Clear previous buttons and overlays
	buttonsContainer.innerHTML = '';
	overlaysContainer.innerHTML = '';
	
	// Create a button and overlay for each category
	sideCategories.forEach((category, categoryIndex) => {
		const categoryName = category.category_name || `category_${categoryIndex}`;
		const categoryData = sideCategoryManager.categories.get(categoryName);
		if (!categoryData) return;
		
		const displayName = categoryData.displayName;
		const items = categoryData.items;
		
		// Create button HTML
		const buttonHtml = `
			<div id="itemSideContainer_${categoryName}" class="">
				<a id="reg_${categoryName}" class="btn-section-header" onclick="openSingleCategoryMenu('${categoryName}');">
					<i class="fa fa-plus"></i> <span>${displayName}</span>
				</a>
				<div id="sideList_${categoryName}" class=""></div>
			</div>
		`;
		buttonsContainer.innerHTML += buttonHtml;
		
		// Build items HTML for this category
		let itemsHtml = '';
		console.log(`📦 Category "${categoryName}" has ${items.length} items`);
		
		items.forEach(item => {
			const cssClass = item.type === 'Premium' ? 'premiumside' : 'regularside';
			const starIcon = item.type === 'Premium' ? ' <i class="fa fa-star"></i>' : '';

// Function to open a single category menu
function openSingleCategoryMenu(categoryName) {
	const parentContainer = document.getElementById('itemSideControl');
	const overlay = document.getElementById(`itemSideControl_${categoryName}`);
	
	if (overlay) {
		// Show parent container first
		if (parentContainer) {
			parentContainer.classList.remove('hide');
		}
		
		// Then show this specific overlay
		overlay.classList.remove('hide');
		console.log(`🎨 Opened category menu: ${categoryName}`);
	} else {
		console.error(`❌ Overlay not found for category: ${categoryName}`);
	}

// Function to close a single category menu (uses manager)
function closeSingleCategoryMenu(categoryName) {
	const parentContainer = document.getElementById('itemSideControl');
	const overlay = document.getElementById(`itemSideControl_${categoryName}`);
	const summaryList = document.getElementById(`sideList_${categoryName}`);
	
	if (overlay) {
		// Validate minimum requirement using manager
		if (!sideCategoryManager.meetsMinimum(categoryName)) {
			const categoryData = sideCategoryManager.categories.get(categoryName);
			const displayName = categoryData ? categoryData.displayName : categoryName;
			const config = sideCategoryManager.getConfig(categoryName);
			const currentTotal = sideCategoryManager.getTotalQuantity(categoryName);
			
			alert(`Please select at least ${config.minimum} item(s) from "${displayName}". Currently selected: ${currentTotal}`);
			return; // Don't close if minimum not met
		}
		
		// Hide this specific overlay
		overlay.classList.add('hide');
		
		// Update summary text for this category
		if (summaryList) {
			const selections = sideCategoryManager.getSelections(categoryName);
			const items = [];
			selections.forEach((item, itemName) => {
				items.push(`${item.quantity} ${itemName}`);
			});
			summaryList.innerText = printArray(items);
		}
		
		// Check if all overlays are now hidden - if so, hide parent container
		if (parentContainer) {
			const allOverlays = parentContainer.querySelectorAll('[id^="itemSideControl_"]');
			const allHidden = Array.from(allOverlays).every(o => o.classList.contains('hide'));
			
			if (allHidden) {
				parentContainer.classList.add('hide');
			}
		}
		
		console.log(`✅ Closed category menu: ${categoryName}`);
	} else {
		console.error(`❌ Overlay not found for category: ${categoryName}`);
	}
}

// Unified function to select a side item (uses manager)
function selectSideItem(element, categoryName) {
	const itemName = element.dataset.itemName;
	const itemPrice = parseFloat(element.dataset.itemPrice) || 0;
	const isSelected = element.classList.contains('select');
	
	console.log(`🖱️ Click: ${itemName} in ${categoryName}, selected: ${isSelected}`);
	
	if (isSelected) {
		// Deselect
		sideCategoryManager.removeSelection(categoryName, itemName);
		element.classList.remove('select');
		
		const parent = element.parentElement;
		const quantityDisplay = parent.querySelector('b');
		const extraButton = parent.querySelector('.btn-add-extra');
		
		if (quantityDisplay) {
			quantityDisplay.classList.add('hide');
			quantityDisplay.innerText = 1;
		}
		if (extraButton) extraButton.classList.add('hide');
	} else {
		// Check if we can select
		if (!sideCategoryManager.canSelect(categoryName, itemName)) {
			const config = sideCategoryManager.getConfig(categoryName);
			const currentTotal = sideCategoryManager.getTotalQuantity(categoryName);
			alert(`You can only select ${config.maximum} item(s) total. Currently selected: ${currentTotal}.`);
			return;
		}
		
		// Select
		sideCategoryManager.addSelection(categoryName, itemName, element, 1, itemPrice);
		element.classList.add('select');
		
		const parent = element.parentElement;
		const quantityDisplay = parent.querySelector('b');
		const extraButton = parent.querySelector('.btn-add-extra');
		
		if (quantityDisplay) quantityDisplay.classList.remove('hide');
		if (extraButton) extraButton.classList.remove('hide');
	}
}

// Function to add extra quantity to a side item (uses manager)
function addExtraSide(element, categoryName) {
	const parent = element.parentElement;

	const quantityDisplay = parent.querySelector('b');
	
	if (!sideButton || !sideButton.classList.contains('select')) {
		return;
	}
	
	const itemName = sideButton.dataset.itemName;
	const currentQty = quantityDisplay ? parseInt(quantityDisplay.innerText) || 1 : 1;

// Function to close side categories menu
function closeSideCategoriesMenu() {
	const list = document.getElementById("sideList");
	const con = document.getElementById("itemSideControl");
	
	// Validate minimum requirements for each category
	if (window.sideCategoryConfigs) {
		for (const [categoryName, config] of Object.entries(window.sideCategoryConfigs)) {
			if (config.minimum > 0) {
				// Find the overlay for this category
				const overlayId = `itemSideControl_${categoryName}`;
				const overlay = document.getElementById(overlayId);
				
				if (overlay) {
					// Get all selected items within this category's overlay
					const selectedItems = overlay.querySelectorAll('.btn-side-option.select');
					
					// Calculate total quantity across all selected items in this category
					let totalQuantity = 0;
					selectedItems.forEach(item => {
						const itemParent = item.parentElement;
						const qtyDisplay = itemParent.querySelector('b');
						totalQuantity += qtyDisplay ? parseInt(qtyDisplay.innerText) || 1 : 1;
					});
					
					if (totalQuantity < config.minimum) {
						// Find the display name for this category
						const categoryElement = document.querySelector(`[data-category="${categoryName}"]`);
						const displayName = categoryElement ? (categoryElement.querySelector('h3')?.innerText || categoryName) : categoryName;
						
						alert(`Please select at least ${config.minimum} item(s) from "${displayName}". Currently selected: ${totalQuantity}`);
						return; // Don't close if minimum not met
					}
				} else {
					// If overlay doesn't exist, check tracking array as fallback
					const categoryItems = categorySidesTracking[categoryName] || [];
					let totalQuantity = 0;
					categoryItems.forEach(itemName => {
						const match = itemName.match(/^(\d+)\s+/);
						if (match) {
							totalQuantity += parseInt(match[1]) || 1;
						} else {
							totalQuantity += 1;
						}
					});
					
					if (totalQuantity < config.minimum) {
						const displayName = document.querySelector(`[data-category="${categoryName}"] h3`)?.innerText || categoryName;
						alert(`Please select at least ${config.minimum} item(s) from "${displayName}". Currently selected: ${totalQuantity}`);
						return; // Don't close if minimum not met
					}
				}
			}
		}
	}
	
	// Update the summary list
	list.innerText = printArray(orderSides);
	
	// Close the overlay
	if (!con.classList.contains('hide')) {
		con.classList.add('hide');
	}
	
	console.log('✅ Side categories menu closed, selections:', orderSides);
}

			if(premAmt>=currentoptions.sideoptions[7]){
				sidePrice=sidePrice+currentoptions.sideoptions[8];
			}
		}

	}

	updatePrices();

function removeSides(ele){
	if (ele.classList.contains('select')){
		if(ele.classList.contains('regularside')){
			if(regAmt>=currentoptions.sideoptions[4]){
				sidePrice=sidePrice-currentoptions.sideoptions[5];
			}
			regAmt=regAmt-parseInt(ele.previousSibling.innerText);

		}else if(ele.classList.contains('premiumside')){
			if(regAmt>=currentoptions.sideoptions[7]){
				sidePrice=sidePrice-currentoptions.sideoptions[8];
			}
			premAmt=premAmt-parseInt(ele.previousSibling.innerText);

		// console.log("REMOVE SIDE: "+ele.previousSibling.innerText+" "+ele.innerText);
		var index = orderSides.indexOf(ele.previousSibling.innerText+" "+ele.innerText);
		orderSides.splice(index,1);

		ele.previousSibling.classList.add('hide')
		ele.previousSibling.innerText=1;
	 	ele.nextSibling.classList.add('hide')
	 	
	}

      `"${cat.name}": ${cat.selected} selected (minimum ${cat.required} required)`
    );

  // Handle new structure with category tracking
  let sidesData = sides;

  if (typeof sides === 'object' && sides !== null && !Array.isArray(sides) && sides.categories) {
    sidesData = sides; // Already in correct format
  }
  // If sides is an array (old format), convert to new format
  else if (Array.isArray(sides)) {
    sidesData = {
      items: sides,
      categories: { 'Sides': sides } // Default category name
    };
  }
  // If sides is a string (backward compatibility)
  else if (typeof sides === 'string' && sides.trim() !== '') {
    const sidesArray = sides.split(',').map(s => s.trim()).filter(s => s);
    sidesData = {
      items: sidesArray,
      categories: { 'Sides': sidesArray }
    };
  }
  // Empty sides
  else {
    sidesData = {
      items: [],
      categories: {}
    };
  }
  
  // Handle adds and mods (arrays)
  let addsArray = Array.isArray(adds) ? adds : [];
  let modsArray = Array.isArray(mods) ? mods : [];
  
  if (typeof adds === 'string' && adds.trim() !== '') {
    addsArray = adds.split(',').map(s => s.trim()).filter(s => s);
  }
  if (typeof mods === 'string' && mods.trim() !== '') {
    modsArray = mods.split(',').map(s => s.trim()).filter(s => s);
  }
  
  console.log('📦 Adding to cart:', {item, sidesData, adds: addsArray, mods: modsArray});
  
  order.push({"item":item,"size":size,"sides":sidesData,"adds":addsArray, "mods":modsArray, "amt":amt,"cost":cost});

  // Track add to cart event

    window.trackAddToCart({
      name: item,
      title: item,
      price: cost / amt, // Base price per unit
      category: 'Menu Item'
    }, amt, cost);
  }

function buildCartCards() {
	const cartContainer = document.getElementById("cartItemsContainer");
	const emptyState = document.getElementById("cartEmptyState");
	
	if (!cartContainer) return;
	
	// Show/hide empty state
	if (order.length === 0) {
		if (emptyState) emptyState.style.display = 'flex';
		cartContainer.innerHTML = '';
		return;
	}
	
	if (emptyState) emptyState.style.display = 'none';
	
	// Build card HTML for each item
	let cardsHtml = '';
	
	for (let i = 0; i < order.length; i++) {
		const item = order[i];
		let itemSides = '';
		let itemAdds = '';
		let itemMods = '';
		let itemSize = '';
		let itemFlavour = '';
		let hasDetails = false;
		
		// Parse size and flavour (size can be "size flavour" or just "size" or "-")
		if (item.size && item.size !== '-') {
			const sizeParts = item.size.split(' ');
			if (sizeParts.length > 1) {
				itemSize = sizeParts[0];
				itemFlavour = sizeParts.slice(1).join(' ');
			} else {
				itemSize = item.size;
			}
		}
		
		// Handle sides with category tracking (new format)
		if (item.sides && typeof item.sides === 'object' && item.sides.categories) {
			const categories = item.sides.categories;
			const categoryNames = Object.keys(categories);
			
			if (categoryNames.length > 0) {
				hasDetails = true;
				const categoryStrings = [];
				categoryNames.forEach(function(catName) {
					const catItems = categories[catName];
					if (catItems && catItems.length > 0) {
						// Extract item names from objects or use strings directly
						const itemNames = catItems.map(function(item) {
							return typeof item === 'object' && item !== null ? (item.name || JSON.stringify(item)) : item;
						});
						categoryStrings.push(`<div class="cart-item-category"><strong>${catName}:</strong> ${itemNames.join(', ')}</div>`);
					}
				});
				itemSides = categoryStrings.join('');
			}
		}
		// Handle old format (array)
		else if (item.sides && item.sides.length > 0) {
			hasDetails = true;
			itemSides = `<div class="cart-item-category"><strong>Sides:</strong> ${item.sides.join(', ')}</div>`;
		}
		
		// Handle additions (can be array of strings or array of [name, price] pairs)
		if (item.adds && item.adds.length > 0) {
			hasDetails = true;
			const addNames = item.adds.filter((add, idx) => idx % 2 === 0); // Get names (even indices)
			itemAdds = `<div class="cart-item-category"><strong>Additions:</strong> ${addNames.join(', ')}</div>`;
		}
		
		if (item.mods && item.mods.length > 0) {
			hasDetails = true;
			itemMods = `<div class="cart-item-category"><strong>Modifications:</strong> ${item.mods.join(', ')}</div>`;
		}
		
		// Show size/flavour in details if they exist and are not "-"
		let itemSizeFlavour = '';
		if (itemSize && itemSize !== '-') {
			itemSizeFlavour += `<div class="cart-item-category"><strong>Size:</strong> ${itemSize}</div>`;
			hasDetails = true;
		}
		if (itemFlavour && itemFlavour !== '-') {
			itemSizeFlavour += `<div class="cart-item-category"><strong>Flavour:</strong> ${itemFlavour}</div>`;
			hasDetails = true;
		}
		
		// Build the card with collapsible feature
		cardsHtml += `
			<div class="cart-item-card collapsed" data-item-index="${i}">
				<div class="cart-item-header">
					<div class="cart-item-number">#${i + 1}</div>
					<button class="cart-item-remove" onclick="event.stopPropagation(); removeItem(${i});" title="Remove item">
						<i class="fa fa-times"></i>
					</button>
				</div>
				<div class="cart-item-body" onclick="toggleCartItem(${i})">
					<div class="cart-item-main-info">
						<div class="cart-item-name-row">
							<div class="cart-item-name">${item.item}</div>
							${hasDetails ? '<i class="fa fa-chevron-down cart-expand-icon"></i>' : ''}
						</div>
						${item.size && item.size !== '-' ? `<div class="cart-item-size">${item.size}</div>` : '<div class="cart-item-size">-</div>'}
					</div>
					${hasDetails ? `
						<div class="cart-item-details">
							${itemSizeFlavour}
							${itemSides}
							${itemAdds}
							${itemMods}
						</div>
					` : ''}
				</div>
				<div class="cart-item-footer">
					<div class="cart-item-quantity">
						<i class="fa fa-times" style="font-size: 0.8em; opacity: 0.7;"></i> ${item.amt}
					</div>
					<div class="cart-item-price">$${item.cost.toFixed(2)}</div>
				</div>
			</div>
		`;
	}
	
	cartContainer.innerHTML = cardsHtml;
}

function advanceOrder(){
	if (!orderingEnabled) {
		alert(orderingDisabledMessage);
		return;
	}
	if (hastables) {
	
		// Get the currently selected location from dropdown
		let currentLocationData = getCurrentLocationData();
		
		// If no location data found, try to use the default (first available location)
		if (!currentLocationData) {
			const locationSelect = document.getElementById('locationSelect');
			if (locationSelect && locationSelect.options.length > 1) {
				// Skip the placeholder option (index 0) and use the first real location (index 1)
				const firstOption = locationSelect.options[1];
				if (firstOption && firstOption.getAttribute('data-address')) {
					// Set the dropdown to the first option
					locationSelect.selectedIndex = 1;
					// Update the WhatsApp number (use value if available, otherwise use fallback)
					const whatsappValue = firstOption.value || '{{ site.Params.orderingsystem.whatsapp }}';
					number = whatsappValue;
					selectLocation(whatsappValue);
					// Get the location data again
					currentLocationData = getCurrentLocationData();
				}
			}
		}
		
		if (currentLocationData) {
			// Update the global WhatsApp number to match the location data
			if (currentLocationData.whatsapp) {
				number = currentLocationData.whatsapp;
			}
			// Close the cart first
			closeCart();
			openTableModalWithLocation(currentLocationData);
		} else {
			// No location available, show alert
			alert('Please select a location first before placing your order.');
			return;
		}
	}else{
		// Close the cart first
		closeCart();
		confirm();
	}
}

function confirmSendOrder(){
	// Track order submission
	if (typeof window.trackOrderSubmission === 'function') {
		const locationSelect = document.getElementById('locationSelect');
		const selectedLocation = locationSelect ? locationSelect.options[locationSelect.selectedIndex]?.text : 'Unknown';
		
		window.trackOrderSubmission({
			items: order,
			totalAmount: price + vatcost + servicecost,

// Enhanced selectTable function to include location context
function selectTable(buttonElement) {
    if (!selectedLocationData) {
        console.error('❌ No location data available for table selection');
        alert('Please select a location first');
        return;
    }
    
    // Remove selected class from all table buttons
    const allTableButtons = document.querySelectorAll('.tableBtn');
    allTableButtons.forEach(btn => btn.classList.remove('selected'));
    
    // Add selected class to the clicked button
    buttonElement.classList.add('selected');
    
    let tableNumber = buttonElement.textContent.trim();
    const isTakeaway = buttonElement.classList.contains('takeaway-btn');
    
    // Extract table number if it starts with "Table "
    if (!isTakeaway && tableNumber.startsWith('Table ')) {
        tableNumber = tableNumber.replace('Table ', '');
    }
    
    // Store selected table info
    window.selectedTableInfo = {
        tableNumber: tableNumber,
        isTakeaway: isTakeaway,
        location: selectedLocationData
    };
    
    // Set global order type variables for WhatsApp message
    currentOrderType = isTakeaway ? 'takeaway' : 'table';
    currentTableNumber = tableNumber;
    myTable = tableNumber; // Set for backward compatibility
    
    // Update the modal to show confirmation
    const tableNumElement = document.getElementById('myTableNum');
    if (tableNumElement) {
        if (isTakeaway) {
            tableNumElement.textContent = 'Ready to place your takeaway order?';
        } else {
            tableNumElement.textContent = `Table ${tableNumber}`;
        }
    }
    
    if (isTakeaway) {
        // For takeaway, update the summary display and go to order confirmation
        updateOrderSummary(selectedLocationData);
        // Show the summary for takeaway orders
        const orderSummaryDisplay = document.getElementById('orderSummaryDisplay');
        if (orderSummaryDisplay) {
            orderSummaryDisplay.classList.remove('hide');
        }
    } else {
        // For table orders, hide the summary
        const orderSummaryDisplay = document.getElementById('orderSummaryDisplay');
        if (orderSummaryDisplay) {
            orderSummaryDisplay.classList.add('hide');
        }
    }
    
    // Scroll to confirmation section smoothly
    const confirmSection = document.getElementById('confirmmodal');
    if (confirmSection) {
        confirmSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// Function to search locations based on user input
function searchLocations(searchTerm) {
	console.log('🔍 Searching for:', searchTerm);
	
	const searchInput = document.getElementById('locationSearch');
	const locationItems = document.querySelectorAll('.locations .location-item');
	
	if (!searchTerm || searchTerm.trim() === '') {
		// Show all locations when search is empty
		locationItems.forEach(item => {
			item.style.display = 'flex';
			item.style.opacity = '1';
			item.style.transform = 'scale(1)';
		});
		
		// Remove any search highlighting
		document.querySelectorAll('.location-item .locbtn').forEach(btn => {
			btn.style.backgroundColor = '';
			btn.style.color = '';
			btn.style.fontWeight = '';
		});
		
		console.log('✅ Showing all locations');
		return;
	}
	
	const searchLower = searchTerm.toLowerCase().trim();
	let foundCount = 0;
	
	locationItems.forEach(item => {
		const locationText = item.querySelector('.locbtn').textContent.toLowerCase();
		const isMatch = locationText.includes(searchLower);
		
		if (isMatch) {
			// Show and highlight matching locations
			item.style.display = 'flex';
			item.style.opacity = '1';
			item.style.transform = 'scale(1.02)';
			
			// Highlight the matching text
			const btn = item.querySelector('.locbtn');
			btn.style.backgroundColor = '#4CAF50';
			btn.style.color = 'white';
			btn.style.fontWeight = 'bold';
			
			foundCount++;
			console.log('✅ Match found:', item.querySelector('.locbtn').textContent.trim());
		} else {
			// Hide non-matching locations
			item.style.display = 'none';
		}
	});
	
	console.log(`🔍 Search complete: ${foundCount} location(s) found`);
	
	// Show search results count
	if (searchInput) {
		const currentPlaceholder = searchInput.placeholder;
		if (foundCount > 0) {
			searchInput.style.borderColor = '#4CAF50';
			searchInput.placeholder = `Found ${foundCount} location(s)`;
		} else {
			searchInput.style.borderColor = '#f44336';
			searchInput.placeholder = 'No locations found';
		}
		
		// Reset placeholder after 3 seconds
		setTimeout(() => {
			searchInput.placeholder = currentPlaceholder;
			searchInput.style.borderColor = '#ddd';
		}, 3000);
	}
}

// Function to populate table numbers based on selected location
function populateTableNumbers(locationData) {
    const tableButtonsContainer = document.getElementById('dynamicTableButtons');
    
    if (!tableButtonsContainer) {
        console.error('❌ Table buttons container not found');
        return;
    }
    
    // Clear existing buttons
    tableButtonsContainer.innerHTML = '';
    
    if (!locationData || !locationData.orderingtables || locationData.orderingtables.length === 0) {
        // Fallback to default table numbers if no location data
        for (let i = 1; i <= 10; i++) {
            const tableBtn = document.createElement('button');
            tableBtn.className = 'tableBtn';
            tableBtn.type = 'button';
            tableBtn.onclick = function() { selectTable(this); };
            tableBtn.textContent = i.toString();
            tableButtonsContainer.appendChild(tableBtn);
        }
        return;
    }
    
    // Process each ordering table option
    locationData.orderingtables.forEach((tableOption, index) => {
        const tableBtn = document.createElement('button');
        tableBtn.type = 'button';
        tableBtn.className = 'tableBtn';
        tableBtn.onclick = function() { selectTable(this); };
        
        if (tableOption === "Takeway Only" || tableOption === "Takeaway Only" || tableOption.toLowerCase().includes('takeaway')) {
            // Add takeaway option
            tableBtn.className = 'tableBtn takeaway-btn';
            tableBtn.textContent = 'Takeaway';
        } else if (tableOption.startsWith('Tables')) {
            // Extract table numbers from "Tables1", "Tables2", etc.
            const tableNumber = tableOption.replace('Tables', '');
            tableBtn.textContent = `Table ${tableNumber}`;
        } else {
            // Handle other table options (display as-is or format)
            tableBtn.textContent = tableOption.startsWith('Table') ? tableOption : `Table ${tableOption}`;
        }
        
        tableButtonsContainer.appendChild(tableBtn);
    });
}

// Function to open table modal with location data from WhatsApp ordering system

    // Check if we have location data from the WhatsApp ordering system
    if (window.currentOrderLocation) {

        updateSelectedLocationDisplay(window.currentOrderLocation);
        
        // Check if the location has ordering tables
        if (window.currentOrderLocation.orderingtables && window.currentOrderLocation.orderingtables.length > 0) {
            selectedLocationData = window.currentOrderLocation;
            populateTableNumbers(window.currentOrderLocation);
        } else {
            // Use fallback table numbers
            populateTableNumbers(null);
        }
        
        
    } else {
        alert('Please select a location first before placing your order.');
        return;
    }
    
    // Show the modal
    document.getElementById('tableNumberModal').classList.remove('hide');
    
    // Show table selection section immediately since we have location data
    document.getElementById('tableSelectionSection').classList.remove('hide');
}

    // Function to get current location data for table modal
    function getCurrentLocationData() {
        const locationSelect = document.getElementById('locationSelect');
        if (!locationSelect || locationSelect.options.length <= 1) {
            return null;
        }
        
        // Find the selected option or default to first real location
        let selectedOption = null;
        const selectedIndex = locationSelect.selectedIndex;
        
        // Check if current selection is valid (not placeholder)
        if (selectedIndex > 0 && selectedIndex < locationSelect.options.length) {
            selectedOption = locationSelect.options[selectedIndex];
            // If selected option has address data, use it even if value is empty
            if (selectedOption.getAttribute('data-address')) {
                // This is a valid location option
            } else {
                selectedOption = null;
            }
        }
        
        // If no valid selection, use first real location (skip placeholder at index 0)
        if (!selectedOption && locationSelect.options.length > 1) {
            selectedOption = locationSelect.options[1];
        }
        
        if (selectedOption) {
            const address = selectedOption.getAttribute('data-address');
            let whatsapp = selectedOption.value;
            const lat = selectedOption.getAttribute('data-lat');
            const lng = selectedOption.getAttribute('data-lng');
            const orderingTables = selectedOption.getAttribute('data-orderingtables');
            
            // If address exists, use this location (even if WhatsApp is empty, we'll use fallback)
            if (address) {
                // Use fallback WhatsApp if value is empty
                if (!whatsapp || whatsapp.trim() === '') {
                    whatsapp = '{{ site.Params.orderingsystem.whatsapp }}';
                }
                
                let parsedOrderingTables = [];
                if (orderingTables && orderingTables.trim() !== '') {
                    parsedOrderingTables = orderingTables.split(',').map(table => table.trim());
                }
                
                return {
                    address: address,
                    whatsapp: whatsapp,
                    lat: lat,
                    lng: lng,
                    orderingtables: parsedOrderingTables
                };
            }
        }
        return null;
    }

    // Function to display taxonomy tags in the order modal
    function displayTaxonomyTags(options) {
        const tagsContainer = document.getElementById("itemtaxonomytags");
        
        if (!tagsContainer) {
            console.log("❌ Tags container not found");
            return;
        }
        
        // Helper function to slugify tag for URL
        function slugify(text) {
            return text.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .trim();
        }
        
        // Define all taxonomy types with their display names and URL paths
        const taxonomies = [
            { key: 'tags', label: 'Tags', urlPath: '/tags/' },
            { key: 'ingredients', label: 'Ingredients', urlPath: '/ingredients/' },
            { key: 'cookingmethods', label: 'Cooking Methods', urlPath: '/cookingmethods/' },
            { key: 'types', label: 'Cuisine Types', urlPath: '/types/' },
            { key: 'events', label: 'Events', urlPath: '/events/' }
        ];
        
        let allTagsHtml = '';
        let hasAnyTags = false;
        
        // Loop through each taxonomy type
        taxonomies.forEach(taxonomy => {
            const items = options[taxonomy.key];
            
            if (items && Array.isArray(items) && items.length > 0) {
                hasAnyTags = true;
                
                // Create section for this taxonomy
                allTagsHtml += `<div class="taxonomy-section" data-taxonomy="${taxonomy.key}">`;
                allTagsHtml += `<span class="taxonomy-label">${taxonomy.label}:</span> `;
                
                // Add each item as a clickable link
                items.forEach((item, index) => {
                    const slug = slugify(item);
                    const url = `${taxonomy.urlPath}${slug}/`;
                    allTagsHtml += `<a href="${url}" class="tag tag-${taxonomy.key}" title="View all items with ${item}">${item}</a>`;
                    if (index < items.length - 1) {
                        allTagsHtml += ' ';
                    }
                });
                
                allTagsHtml += '</div>';
            }
        });
        
        if (hasAnyTags) {
            tagsContainer.innerHTML = `<div class="tags-container">${allTagsHtml}</div>`;
            tagsContainer.style.display = 'block';
            console.log("✅ Taxonomies displayed:", {
                tags: options.tags?.length || 0,
                ingredients: options.ingredients?.length || 0,
                cookingmethods: options.cookingmethods?.length || 0,
                types: options.types?.length || 0,
                events: options.events?.length || 0
            });
        } else {
            // Hide tags container if no tags
            tagsContainer.innerHTML = '';
            tagsContainer.style.display = 'none';
            console.log("ℹ️ No taxonomies to display");
        }
    }
