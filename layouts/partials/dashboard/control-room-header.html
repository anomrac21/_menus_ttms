{{- $siteName := site.Title | default "Menu Demo" -}}
{{- $siteName = $siteName | strings.TrimSpace | replaceRE `^["']+|["']+$` "" -}}
<div class="dashboard-header-bar">
  <a href="/" class="dashboard-logo-link" id="dashboardLogoLink" aria-label="{{ $siteName }} — view live menu" title="View {{ $siteName }} menu site">
    <span class="dashboard-logo-frame" aria-hidden="true">
      <img class="dashboard-logo" src="/branding/favicon192.webp" alt="" width="52" height="52">
    </span>
    <span class="dashboard-logo-live-badge">Live</span>
  </a>
  <div class="dashboard-header-main">
    <p class="dashboard-header-kicker"><span class="dashboard-header-kicker-dot" aria-hidden="true"></span>Menu control room</p>
    <h1 class="dashboard-header-site" id="dashboardHeaderSiteName">{{ $siteName }}</h1>
    <p class="dashboard-header-tagline">Manage your digital menu and content</p>
  </div>
  <div class="dashboard-header-end">
    <div class="dashboard-header-account-wrap">
      <span class="dashboard-header-account-icon" aria-hidden="true"><i class="fa fa-user-circle-o"></i></span>
      <p class="dashboard-header-account" id="dashboardHeaderUserName" title="">—</p>
    </div>
    <button type="button" class="btn-dash btn-dash-secondary dashboard-header-signout" id="btnLogout"><i class="fa fa-sign-out" aria-hidden="true"></i> Sign out</button>
  </div>
</div>
