<div id="account-dashboard" class="loader-hide-right account-dashboard-panel" aria-hidden="true">
	<div class="header account-dashboard-panel-header account-dashboard-panel__header">
		<div id="menu" class="account-dashboard-panel-menu">
			<div class="account-dashboard-panel-header-inner">
				<div class="account-dashboard-panel-heading">
					<h2 id="account-dashboard-header-placeholder-title" class="account-dashboard-panel-title">Account</h2>
					<div id="account-dashboard-user-info" class="account-dashboard-user-info account-dashboard-user-info--header" style="display: none;">
						<a href="https://www.ttmenus.com/account/" class="user-info-header account-dashboard-profile-link" target="_blank" rel="noopener noreferrer" onclick="if (typeof closeAll === 'function') closeAll();" aria-label="Open your TT Menus account">
							<div class="user-avatar">
								<svg class="icon account" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
									<path d="M8 7C9.65685 7 11 5.65685 11 4C11 2.34315 9.65685 1 8 1C6.34315 1 5 2.34315 5 4C5 5.65685 6.34315 7 8 7Z" fill="currentColor"/>
									<path d="M14 12C14 10.3431 12.6569 9 11 9H5C3.34315 9 2 10.3431 2 12V15H14V12Z" fill="currentColor"/>
								</svg>
							</div>
							<div class="user-details">
								<div class="user-name" id="account-dashboard-username">Loading...</div>
								<div class="user-email" id="account-dashboard-email"></div>
							</div>
						</a>
					</div>
				</div>
				<div class="account-dashboard-panel-tools">
					<a href="/dashboard/" class="account-dashboard-admin-link ttms-icon-btn ttms-icon-btn--on-dark" data-auth="admin" style="display: none;" title="Menu dashboard" aria-label="Menu dashboard" data-barba="prevent" onclick="if (typeof closeAll === 'function') closeAll();">
						<i class="fa fa-th-large" aria-hidden="true"></i>
					</a>
					<button type="button" class="dashboard-header-close ttms-icon-btn ttms-icon-btn--on-dark" onclick="closeAccountDashboard(); return false;" aria-label="Close account panel">
						<img class="dashboard-header-close-img" src="https://cdn.ttmenus.com/icons/ui/close.svg" alt="" width="24" height="24" decoding="async">
					</button>
				</div>
			</div>
		</div>
	</div>

	<div class="body account-dashboard-panel__body">
		<div class="account-dashboard-body-scroll">
			<div id="account-dashboard-logout-btn" class="account-dashboard-logout" style="display: none;">
				<button type="button" class="account-dashboard-btn account-dashboard-btn--logout" data-account-logout aria-label="Log out">
					<svg class="account-dashboard-btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
						<path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
					</svg>
					<span class="account-dashboard-btn__label">Log out</span>
				</button>
			</div>

			<div id="account-dashboard-login-prompt" class="account-dashboard-login-prompt account-dashboard-card" style="display: block;">
				<div class="login-prompt-content">
					<div class="account-dashboard-login-prompt__icon-wrap" aria-hidden="true">
						<svg class="icon account" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
							<path d="M8 7C9.65685 7 11 5.65685 11 4C11 2.34315 9.65685 1 8 1C6.34315 1 5 2.34315 5 4C5 5.65685 6.34315 7 8 7Z" fill="currentColor"/>
							<path d="M14 12C14 10.3431 12.6569 9 11 9H5C3.34315 9 2 10.3431 2 12V15H14V12Z" fill="currentColor"/>
						</svg>
					</div>
					<p class="account-dashboard-login-prompt__text">Sign in with your TT Menus account to save favorites and sync across menus.</p>
					<a href="/login/" class="login-prompt-button account-dashboard-btn account-dashboard-btn--primary" onclick="if (typeof closeAll === 'function') closeAll();">
						<span>Sign in on TT Menus</span>
					</a>
				</div>
			</div>

			<div id="account-dashboard-user-data" class="account-dashboard-user-data account-dashboard-card" style="display: none;">
				<div class="user-data-section">
					<h3 class="user-data-title">My Favorites</h3>
					<div id="account-dashboard-favorites" class="account-dashboard-favorites"></div>
					<p id="account-dashboard-favorites-empty" class="user-data-empty" style="display: none;">No favorites yet. Tap ♡ on dishes while browsing menus.</p>
				</div>
			</div>
		</div>
	</div>
</div>
