{{- if site.Params.auth.enabled -}}
<div
  id="menu-item-edit-modal"
  class="menu-item-edit-modal"
  hidden
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
  aria-labelledby="menu-item-edit-modal-title"
  data-auth="admin-site"
  style="display: none;"
>
  <div class="menu-item-edit-modal__backdrop" data-close-menu-item-edit-modal tabindex="-1" aria-hidden="true"></div>
  <div class="menu-item-edit-modal__panel">
    <header class="menu-item-edit-modal__header">
      <div class="menu-item-edit-modal__title-wrap">
        <h2 id="menu-item-edit-modal-title" class="menu-item-edit-modal__title">Edit menu item</h2>
        <button
          type="button"
          class="menu-content-draft-badge menu-content-draft-badge--modal hidden"
          id="menuItemEditModalDraftBadge"
          title="Load unpublished CMS draft"
          aria-label="Load unpublished CMS draft"
          hidden
        >
          <i class="fa fa-exclamation-circle" aria-hidden="true"></i>
        </button>
      </div>
      <button
        type="button"
        class="menu-item-edit-modal__close"
        data-close-menu-item-edit-modal
        aria-label="Close editor"
      >
        <i class="fa fa-times" aria-hidden="true"></i>
      </button>
    </header>
    <div class="menu-item-edit-modal__body">
      <div
        id="menuItemEditModalLoading"
        class="menu-item-edit-modal__loading"
        role="status"
        aria-live="polite"
        aria-busy="true"
        hidden
      >
        <div class="menu-item-edit-modal__loading-inner">
          <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
          <span class="menu-item-edit-modal__loading-label">Loading editor…</span>
        </div>
      </div>
      <iframe
        id="menuItemEditModalFrame"
        class="menu-item-edit-modal__frame"
        title="Menu content editor"
        src="about:blank"
        loading="lazy"
      ></iframe>
    </div>
  </div>
</div>
{{- end -}}
